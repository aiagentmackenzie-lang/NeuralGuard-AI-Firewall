name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev --extra db

      - name: Ruff check
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

      - name: Mypy type check
        run: uv run mypy src/neuralguard/
        continue-on-error: true  # Don't block CI on strict typing yet

  # ── Test ─────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --extra db

      - name: Run unit tests
        run: uv run pytest tests/unit/ -v --tb=short -m "not slow"

      - name: Run integration tests
        run: uv run pytest tests/integration/ -v --tb=short

      - name: Run redteam tests
        run: uv run pytest tests/redteam/ -v --tb=short

  # ── Coverage ─────────────────────────────────────────────────────────
  coverage:
    name: Coverage gate (90%)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev --extra db

      - name: Run coverage
        run: |
          uv run pytest tests/ --cov=neuralguard --cov-report=term-missing --cov-fail-under=90

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  # ── Security scan ───────────────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev --extra db

      - name: Check for known vulnerabilities
        run: |
          uv pip audit 2>/dev/null || uv run pip-audit 2>/dev/null || echo "pip-audit not available, skipping"
        continue-on-error: true

  # ── SBOM ─────────────────────────────────────────────────────────────
  sbom:
    name: Generate SBOM (CycloneDX)
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev --extra db

      - name: Install CycloneDX tool
        run: uv run pip install cyclonedx-bom

      - name: Generate SBOM (JSON)
        run: |
          uv run cyclonedx-py environment --output-format json --output-file sbom.json
          echo "SBOM generated:"
          uv run python -c "import json; d=json.load(open('sbom.json')); print(f'  Components: {len(d.get(\"components\", []))}')"

      - name: Generate SBOM (XML)
        run: |
          uv run cyclonedx-py environment --output-format xml --output-file sbom.xml

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom.json
            sbom.xml