services:
  neuralguard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${NEURALGUARD_PORT:-8000}:8000"
    environment:
      - NEURALGUARD_ENVIRONMENT=${NEURALGUARD_ENVIRONMENT:-production}
      - NEURALGUARD_LOG_LEVEL=${NEURALGUARD_LOG_LEVEL:-INFO}
      - NEURALGUARD_SCANNER_SEMANTIC_ENABLED=${SEMANTIC_ENABLED:-false}
      - NEURALGUARD_SCANNER_JUDGE_ENABLED=${JUDGE_ENABLED:-false}
      - NEURALGUARD_AUDIT_BACKEND=${AUDIT_BACKEND:-jsonl}
      - NEURALGUARD_AUDIT_POSTGRES_URL=${AUDIT_POSTGRES_URL:-postgresql+asyncpg://neuralguard:changeme@postgres:5432/neuralguard}
      - NEURALGUARD_AUDIT_JSONL_PATH=/data/audit
    volumes:
      - audit_data:/data/audit
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: neuralguard
      POSTGRES_USER: neuralguard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuralguard -d neuralguard"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  audit_data:
  pgdata: